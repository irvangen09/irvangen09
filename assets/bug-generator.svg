<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200"
     height="520"
     viewBox="0 0 1200 520">

<style>

text{
font-family:'Segoe UI',Arial,sans-serif;
fill:#d4d4d4;
}

.title{
font-size:22px;
font-weight:bold;
}

.label{
font-size:18px;
}

.value{
font-size:18px;
font-weight:bold;
}

.small{
font-size:16px;
font-family:Consolas,monospace;
}

@keyframes progress{
0%{width:0;}
40%{width:520px;}
55%{width:520px;}
100%{width:0;}
}

@keyframes showResult{
0%,45%{opacity:0;}
55%,100%{opacity:1;}
}

@keyframes hideResult{
0%,45%{opacity:1;}
55%,100%{opacity:0;}
}

#progress{
animation:progress 8s linear infinite;
}

</style>

<rect width="1200" height="520" fill="#1e1e1e"/>

<rect x="0"
      y="0"
      width="1200"
      height="48"
      fill="#2d2d30"/>

<text x="30"
      y="31"
      class="title">
🐛 Bug Generator v1.0
</text>

<line x1="0"
      y1="48"
      x2="1200"
      y2="48"
      stroke="#3c3c3c"/>

<!-- Stats -->

<text x="40" y="100" class="label">🐞 Fixed Bugs</text>
<text x="1040"
      y="100"
      class="value">

4

<set
    attributeName="textContent"
    to="5"
    begin="4s"
    repeatCount="indefinite"/>

</text>

<rect x="40"
      y="115"
      width="420"
      height="12"
      rx="6"
      fill="#333"/>

<rect x="40"
      y="115"
      width="120"
      height="12"
      rx="6"
      fill="#22c55e">

    <animate
        attributeName="width"
        values="120;150;120"
        dur="8s"
        repeatCount="indefinite"/>

</rect>

<!-- -->

<text x="40" y="170" class="label">💀 New Bugs</text>
<text x="1040"
      y="170"
      class="value">

12

<set
    attributeName="textContent"
    to="15"
    begin="4s"
    repeatCount="indefinite"/>

</text>

<rect x="40"
      y="185"
      width="420"
      height="12"
      rx="6"
      fill="#333"/>

<rect x="40"
      y="185"
      width="360"
      height="12"
      rx="6"
      fill="#ef4444">

    <animate
        attributeName="width"
        values="360;410;360"
        dur="8s"
        repeatCount="indefinite"/>

</rect>

<!-- -->

<text x="40" y="240" class="label">☕ Coffee</text>
<text x="1040"
      y="240"
      class="value">

98%

<set
    attributeName="textContent"
    to="0%"
    begin="4s"
    repeatCount="indefinite"/>

</text>

<rect x="40"
      y="255"
      width="420"
      height="12"
      rx="6"
      fill="#333"/>

<rect x="40"
      y="255"
      width="410"
      height="12"
      rx="6"
      fill="#f59e0b">

    <animate
        attributeName="width"
        values="410;40;410"
        dur="8s"
        repeatCount="indefinite"/>

</rect>

<!-- -->

<text x="40" y="310" class="label">🧠 Sanity</text>
<text x="1040"
      y="310"
      class="value">

3%

<set
    attributeName="textContent"
    to="-12%"
    begin="4s"
    repeatCount="indefinite"/>

</text>

<rect x="40"
      y="325"
      width="420"
      height="12"
      rx="6"
      fill="#333"/>

<rect x="40"
      y="325"
      width="18"
      height="12"
      rx="6"
      fill="#3b82f6">

    <animate
        attributeName="width"
        values="18;0;18"
        dur="8s"
        repeatCount="indefinite"/>

</rect>

<!-- Console -->

<rect x="520"
      y="80"
      width="640"
      height="380"
      rx="10"
      fill="#181818"
      stroke="#303030"/>

<text x="545"
      y="115"
      class="small"
      fill="#9cdcfe">

PS C:\Users\irvangen09&gt; fix bug

</text>

<text x="545"
      y="155"
      class="small"
      fill="#8fd18f">

<text x="545"
      y="155"
      class="small"
      fill="#8fd18f">

✔ Bug fixed.

<animate
attributeName="opacity"
values="1;1;0;0"
dur="8s"
repeatCount="indefinite"/>

</text>

</text>

<text x="545"
      y="195"
      class="small">

Scanning project...

</text>

<rect x="545"
      y="220"
      width="520"
      height="12"
      rx="6"
      fill="#333"/>

<rect id="progress"
      x="545"
      y="220"
      width="0"
      height="12"
      rx="6"
      fill="#22c55e"/>

<text x="545"
      y="280"
      class="small"
      fill="#d16969">

💀 +3 New Bugs Discovered

<animate
attributeName="opacity"
values="0;0;1;1"
dur="8s"
repeatCount="indefinite"/>

</text>

<text x="545"
      y="330"
      class="small"
      fill="#d7ba7d">

🏆 Achievement Unlocked

<animate
attributeName="opacity"
values="0;0;1;1"
dur="8s"
repeatCount="indefinite"/>

</text>

<text x="545"
      y="360"
      class="small">

"One Step Forward, Three Steps Back"

</text>

</svg>